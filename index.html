<!DOCTYPE html>
<html lang="en-gb" data-theme="dark" dir="ltr" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Real Estate Analyzer | BITS Pilani WILP</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
   THEME VARIABLES
========================= */

:root[data-theme="dark"] {
  --bg: #0f172a;
  --sidebar: #1e293b;
  --accent: #3b82f6;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text-main: #f8fafc;
  --text-dim: #94a3b8;
  --positive: #10b981;
  --warning: #f59e0b;
}

:root[data-theme="light"] {
  --bg: #f8fafc;
  --sidebar: #ffffff;
  --accent: #2563eb;
  --card: #ffffff;
  --border: #e2e8f0;
  --text-main: #0f172a;
  --text-dim: #475569;
  --positive: #059669;
  --warning: #d97706;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-main);
  height: 100vh;
  display: flex;
}

.sidebar-container {
  width: 320px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.main-content {
  flex: 1;
  padding: 32px;
  overflow-y: auto;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
}

/* Toggle button */
.theme-btn {
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-main);
}

</style>
</head>

<body>

<!-- Loading -->
<div id="loading-overlay"
 class="fixed inset-0 z-50 flex items-center justify-center transition-opacity duration-1000"
 style="background: var(--bg)">
  <div class="text-center">
    <div class="inline-block w-12 h-12 border-4 border-slate-500 border-t-blue-500 rounded-full animate-spin"></div>
    <p class="mt-6 text-[10px] tracking-widest uppercase" style="color: var(--text-dim)">
      Initializing Intelligence Core
    </p>
  </div>
</div>

<!-- Sidebar -->
<aside class="sidebar-container">
  <h1 class="text-lg font-extrabold uppercase tracking-wide text-blue-500">
    India Real Estate Analyzer
  </h1>
</aside>

<!-- Main -->
<main class="main-content">

<header class="flex justify-between items-center mb-8">
  <div>
    <h2 class="text-3xl font-bold">Market Intelligence</h2>
    <p class="text-sm" style="color: var(--text-dim)">India real estate corridors simulation.</p>
  </div>

  <!-- ✅ THEME TOGGLE -->
  <button id="themeToggle" class="theme-btn">🌙 DARK</button>
</header>

<div class="card">
  <p class="text-lg font-semibold">Dashboard Ready</p>
</div>

</main>

<!-- ======================
     THEME SCRIPT
====================== -->
<script>
const root = document.documentElement;
const toggleBtn = document.getElementById("themeToggle");

// Load saved theme
const savedTheme = localStorage.getItem("theme") || "dark";
root.setAttribute("data-theme", savedTheme);
updateBtn(savedTheme);

toggleBtn.addEventListener("click", () => {
  const current = root.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  root.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
  updateBtn(next);
});

function updateBtn(theme) {
  toggleBtn.textContent = theme === "dark" ? "🌙 DARK" : "☀️ LIGHT";
}

// Loader hide
window.onload = () => {
  setTimeout(() => {
    const l = document.getElementById("loading-overlay");
    l.style.opacity = "0";
    setTimeout(() => l.style.display = "none", 800);
  }, 1000);
};
</script>

</body>
</html>
