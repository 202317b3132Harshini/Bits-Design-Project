<!DOCTYPE html>
<html lang="en-gb" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Real Estate Analyzer | BITS Pilani WILP</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* =======================
       THEME VARIABLES
    ======================= */
    :root {
      --bg: #0f172a;
      --sidebar: #1e293b;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --accent: #3b82f6;
      --positive: #10b981;
      --warning: #f59e0b;
    }

    html.light-theme {
      --bg: #f8fafc;
      --sidebar: #ffffff;
      --card: rgba(0,0,0,0.03);
      --border: rgba(0,0,0,0.12);
      --text-main: #0f172a;
      --text-dim: #475569;
      --accent: #2563eb;
      --positive: #059669;
      --warning: #d97706;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      transition: background 0.3s, color 0.3s;
    }

    .sidebar {
      width: 320px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 24px;
    }

    main {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
    }

    label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      font-weight: 700;
    }

    select, input[type="range"] {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 12px;
    }

    select {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 8px;
      color: var(--text-main);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }
  </style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading-overlay"
     class="fixed inset-0 z-50 flex items-center justify-center"
     style="background: var(--bg);">
  <span class="uppercase tracking-widest text-xs text-slate-400">
    Initializing Intelligence Core…
  </span>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <h1 class="text-lg font-extrabold text-blue-500 mb-6 uppercase tracking-wider">
    India Real Estate
  </h1>

  <label>Target City</label>
  <select id="city-select"></select>

  <label>Locality</label>
  <select id="locality-select"></select>

  <label>Square Feet</label>
  <input type="range" id="sqft-slider" min="500" max="5000" value="1200">

  <label>Bedrooms (BHK)</label>
  <input type="range" id="bhk-slider" min="1" max="5" value="2">

  <label>Property Age</label>
  <input type="range" id="age-slider" min="0" max="30" value="0">
</aside>

<!-- MAIN DASHBOARD -->
<main>
  <header class="flex justify-between items-center mb-8">
    <div>
      <h2 class="text-2xl font-bold">Market Intelligence</h2>
      <p class="text-sm text-slate-400">India Real Estate Simulation</p>
    </div>

    <button id="theme-toggle"
      class="px-3 py-2 rounded-full text-xs font-bold border border-slate-500">
      🌙 DARK
    </button>
  </header>

  <div class="card mb-8">
    <p class="text-xs uppercase text-blue-400 tracking-widest">
      Estimated Market Value
    </p>
    <h3 class="text-5xl font-extrabold mt-2">
      ₹<span id="predicted-price">0</span>
    </h3>
    <span id="market-tag"
      class="inline-block mt-3 px-3 py-1 text-xs rounded-full border">
      Market Moderate
    </span>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="card">
      <canvas id="barChart"></canvas>
    </div>
    <div class="card">
      <canvas id="scatterChart"></canvas>
    </div>
  </div>
</main>

<script>
/* =====================
   GLOBALS
===================== */
let LOCATIONS = {};
const WEIGHTS = { bedroom: 0.12, agePenalty: 0.015 };
const root = document.documentElement;
let charts = {};

/* =====================
   INIT
===================== */
window.onload = async () => {
  setupTheme();
  await loadLocations();
  populateCities();
  populateLocalities();
  initCharts();
  updatePrediction();
  document.getElementById('loading-overlay').style.display = 'none';
};

/* =====================
   THEME
===================== */
function setupTheme() {
  const btn = document.getElementById('theme-toggle');
  const saved = localStorage.getItem('theme') || 'dark';
  applyTheme(saved);
  btn.onclick = () => {
    const next = root.classList.contains('light-theme') ? 'dark' : 'light';
    applyTheme(next);
  };
}

function applyTheme(theme) {
  const btn = document.getElementById('theme-toggle');
  if (theme === 'light') {
    root.classList.add('light-theme');
    btn.textContent = '☀️ LIGHT';
  } else {
    root.classList.remove('light-theme');
    btn.textContent = '🌙 DARK';
  }
  localStorage.setItem('theme', theme);
}

/* =====================
   DATA
===================== */
async function loadLocations() {
  const res = await fetch('/locations.json');
  LOCATIONS = await res.json();
}

/* =====================
   UI
===================== */
function populateCities() {
  const city = document.getElementById('city-select');
  Object.keys(LOCATIONS).forEach(c => {
    const o = document.createElement('option');
    o.value = c;
    o.textContent = c;
    city.appendChild(o);
  });
}

function populateLocalities() {
  const city = document.getElementById('city-select').value;
  const loc = document.getElementById('locality-select');
  loc.innerHTML = '';
  Object.keys(LOCATIONS[city].localities).forEach(l => {
    const o = document.createElement('option');
    o.value = l;
    o.textContent = l;
    loc.appendChild(o);
  });
}

/* =====================
   PRICE
===================== */
function updatePrediction() {
  const city = city-select.value;
  const loc = locality-select.value;
  const sqft = +sqft-slider.value;
  const bhk = +bhk-slider.value;
  const age = +age-slider.value;

  let price = LOCATIONS[city].basePrice * sqft *
              LOCATIONS[city].localities[loc];
  price *= 1 + (bhk - 1) * WEIGHTS.bedroom;
  price *= 1 - age * WEIGHTS.agePenalty;

  document.getElementById('predicted-price')
    .textContent = Math.round(price).toLocaleString('en-IN');
}

/* =====================
   CHARTS
===================== */
function initCharts() {
  charts.bar = new Chart(barChart, {
    type: 'bar',
    data: { labels: [], datasets: [{ data: [], backgroundColor: '#3b82f6' }] }
  });

  charts.scatter = new Chart(scatterChart, {
    type: 'scatter',
    data: { datasets: [{ data: [] }] }
  });
}
</script>

</body>
</html>
``
